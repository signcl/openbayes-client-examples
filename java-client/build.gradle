plugins {
    id 'java'
    id 'application'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // GraphQL is sent over the JDK's built-in java.net.http client; we only need JSON.
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'

    // S3 / MinIO upload of the source code.
    implementation platform('software.amazon.awssdk:bom:2.39.6')
    implementation 'software.amazon.awssdk:s3'

    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    // Runs the full create-task flow end to end (config from environment variables).
    mainClass = 'com.openbayes.client.CreateTaskExample'
}

test {
    useJUnitPlatform()
}

// Clone mode example (bind a prepared workspace, no upload): ./gradlew runWorkspace
tasks.register('runWorkspace', JavaExec) {
    group = 'application'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.openbayes.client.RunWorkspaceTaskExample'
}
